events {}

http {
  upstream backend {
    server node-1:3000;
    server node-2:3000;
    server node-3:3000;
  }

  server {
    listen 80;
    server_name minirtc.natewillard.com;
    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl;
    server_name minirtc.natewillard.com;

    ssl_certificate /etc/letsencrypt/live/minirtc.natewillard.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/minirtc.natewillard.com/privkey.pem;

    location / {
      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_read_timeout 3600;
    }
  }
}
