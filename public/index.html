<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>MiniRTC</title>
</head>
<body>
  <h1>MiniRTC</h1>
  <button id="create">Create Room</button>

  <script>
    document.getElementById("create").addEventListener("click", async () => {
      const res = await fetch("/rooms", { method: "POST" });
      const { id } = await res.json();
      window.location.href = `/room.html?id=${id}`;
    });
  </script>
</body>
</html>
