events {}

http {
  upstream backend {
    server node-1:3000;
    server node-2:3000;
    server node-3:3000;
  }

  server {
    listen 80;

    location / {
      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_read_timeout 3600;
    }
  }
}
