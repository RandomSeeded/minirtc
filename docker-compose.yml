services:
  redis:
    image: redis:7-alpine

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - node-1
      - node-2
      - node-3
      - redis

  node-1:
    build: .
    environment:
      - NODE_ENV=production
      - PORT=3000
      - INSTANCE_ID=node-1
      - REDIS_URL=redis://redis:6379

  node-2:
    build: .
    environment:
      - NODE_ENV=production
      - PORT=3000
      - INSTANCE_ID=node-2
      - REDIS_URL=redis://redis:6379

  node-3:
    build: .
    environment:
      - NODE_ENV=production
      - PORT=3000
      - INSTANCE_ID=node-3
      - REDIS_URL=redis://redis:6379
